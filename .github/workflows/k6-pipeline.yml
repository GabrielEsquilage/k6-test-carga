name: K6 Performance Test Pipeline

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 11 * * *" # 08:00 AM GMT-3 (Brasília Time)
    - cron: "0 15 * * *" # 12:00 PM GMT-3 (Brasília Time)
    - cron: "0 22 * * *" # 19:00 PM GMT-3 (Brasília Time)

jobs:
  performance-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22" # Using a recent LTS version

      - name: Set up k6
        uses: grafana/setup-k6-action@v1
        with:
          k6-version: 1.0.0 # Specify a k6 version

      - name: Install dependencies
        run: npm install

      - name: Install Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Run K6 and Generate Report
        run: npm run full:prod
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable

      - name: Get HTML Report Content
        id: html_report
        run: |
          echo "report_content<<EOF" >> "$GITHUB_OUTPUT"
          cat reports/Relatorio-K6.html >> "$GITHUB_OUTPUT"
          echo "" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Upload K6 PDF Report
        uses: actions/upload-artifact@v4
        with:
          name: k6-pdf-report
          path: reports/Relatorio-K6.pdf

      - name: Send Email with Report
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: Production Performance Test Report
          html_body: ${{ steps.html_report.outputs.report_content }}
          to: ${{ secrets.EMAIL_RECIPIENTS }}
          from: ${{ secrets.EMAIL_USERNAME }}
          attachments: reports/Relatorio-K6.pdf
